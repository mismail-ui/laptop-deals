name: Refresh laptop deals

on:
  schedule:
    - cron: "0 * * * *"   # every hour (UTC). GitHub may delay under load.
  workflow_dispatch: {}     # lets you trigger a refresh manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull latest deals
        run: node scripts/refresh.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit if changed
        run: |
          git config user.name  "deals-bot"
          git config user.email "deals-bot@users.noreply.github.com"
          git add deals.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh deals ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            # Rebase onto any newer remote commits, then push (with one retry) to
            # avoid "fetch first" rejections when runs overlap.
            git pull --rebase --autostash origin main || true
            git push || (git pull --rebase --autostash origin main && git push)
          fi
